##############################################################
# Nginx Configuration for: panel.besurebot.com
# Place this file at: /etc/nginx/sites-available/panel.besurebot.com
# Then run: sudo ln -s /etc/nginx/sites-available/panel.besurebot.com /etc/nginx/sites-enabled/
##############################################################

server {
    listen 80;
    listen [::]:80;
    server_name panel.besurebot.com;

    # Redirect all HTTP to HTTPS (after SSL is set up)
    # Comment out these 3 lines if you don't have SSL yet:
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    root /var/www/whatsapp-ai/app/public;
    index index.php index.html;

    # Logs per-domain so you can debug reseller issues
    access_log /var/log/nginx/panel.besurebot.com.access.log;
    error_log  /var/log/nginx/panel.besurebot.com.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # File upload size
    client_max_body_size 20M;
}


##############################################################
# HTTPS block — add this AFTER running certbot
# sudo certbot --nginx -d panel.besurebot.com
# Certbot will auto-fill the SSL block below
##############################################################

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name panel.besurebot.com;

    root /var/www/whatsapp-ai/app/public;
    index index.php index.html;

    # SSL certs (auto-filled by certbot, or manually set):
    ssl_certificate     /etc/letsencrypt/live/panel.besurebot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.besurebot.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/panel.besurebot.com.ssl.access.log;
    error_log  /var/log/nginx/panel.besurebot.com.ssl.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    client_max_body_size 20M;
}
