name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "🚀 Starting Deployment..."

            # Fetch latest code
            cd /var/www/whatsapp-ai
            git pull origin main

            # Update Laravel Backend
            cd /var/www/whatsapp-ai/app
            composer install --optimize-autoloader --no-dev
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Update Node.js Engine
            cd /var/www/whatsapp-ai/bot
            npm install

            # Fix bot .env — LARAVEL_URL must be HTTPS (Nginx redirects HTTP→HTTPS, breaking POST)
            sed -i 's|LARAVEL_URL=.*|LARAVEL_URL=https://ichatup.com|' /var/www/whatsapp-ai/bot/.env
            echo "LARAVEL_URL is now: $(grep LARAVEL_URL /var/www/whatsapp-ai/bot/.env)"

            # Restart WhatsApp PM2 Process
            # Try multiple strategies in order:
            # 1. Kill any stale whatsapp-engine processes
            pm2 stop whatsapp-engine 2>/dev/null || true
            pm2 delete whatsapp-engine 2>/dev/null || true
            # 2. Restart ichatup-bot if it exists in PM2
            if pm2 describe ichatup-bot > /dev/null 2>&1; then
              echo "Restarting existing ichatup-bot process..."
              pm2 restart ichatup-bot --update-env
            else
              echo "Starting fresh ichatup-bot from pm2.config.js..."
              cd /var/www/whatsapp-ai/bot
              pm2 start /var/www/whatsapp-ai/bot/pm2.config.js
            fi
            pm2 save

            echo "=== PM2 Status ==="
            pm2 list

            echo "✅ DEPLOYMENT SUCCESSFUL!"
