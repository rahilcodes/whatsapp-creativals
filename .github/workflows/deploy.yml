name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "🚀 Starting Deployment..."
            cd /var/www/whatsapp-ai
            
            # Fetch latest code
            git pull origin main
            
            # Update Laravel Backend
            cd app
            composer install --optimize-autoloader --no-dev
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Update Node.js Engine
            cd ../bot
            npm install
            
            # Restart WhatsApp PM2 Process (use pm2.config.js for correct name)
            # Stop legacy 'whatsapp-engine' process if it exists (naming fix)
            pm2 stop whatsapp-engine 2>/dev/null || true
            pm2 delete whatsapp-engine 2>/dev/null || true
            # Restart or start using the config file (process name: ichatup-bot)
            pm2 restart ichatup-bot 2>/dev/null || pm2 start pm2.config.js
            pm2 save
            
            echo "✅ DEPLOYMENT SUCCESSFUL!"
